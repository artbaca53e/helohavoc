<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      #content { padding: 24px 0; }
      .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .panel { background: #fff; border: 1px solid #d0d0d8; border-radius: 12px; padding: 16px; }
          </style>
  </head>
  <body>
    <div class="shell">
      <div class="nav">
        <a href="/">Home</a><a href="/mealplan/">Meal Plan</a><a href="/dashboard/">Dashboard</a><a href="/tools/">Tools</a><a href="/rc/">RC</a>
      </div>
      <div id="content">Loading...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const supabaseUrl = "https://qrjymlbdmbphntryfewv.supabase.co/rest/v1/";
      const supabaseKey = "sb_publishable_g4v21yJyKokXhphJnGXu0g_U_nKPE6i";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            async function loadPage(slug) {
        const { data, error } = await supabase
          .from("pages")
          .select("*")
          .eq("slug", slug)
          .single();

        if (error || !data) {
          document.getElementById("content").innerHTML = "<h1>Page not found</h1>";
          return;
        }

        document.title = data.title;
        document.getElementById("content").innerHTML = `
                  <h1>${data.title}</h1>
          <div class="grid">
            <div class="panel"><strong>Projects</strong><p class="small">${data.content}</p></div>
            <div class="panel"><strong>Tasks</strong><p class="small">What needs doing next</p></div>
            <div class="panel"><strong>Notes</strong><p class="small">Quick reminders and context</p></div>
          </div>
        `;
      }

      loadPage("dashboard");
    </script>
  </body>
</html>
