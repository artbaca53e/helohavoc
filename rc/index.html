<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RC Workspace</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .grid { display: grid; gap: 16px; grid-template-columns: 2fr 1fr; }
      .panel { background: #fff; border: 1px solid #d0d0d8; border-radius: 12px; padding: 16px; }
      input, textarea, button { width: 100%; box-sizing: border-box; margin-top: 8px; margin-bottom: 12px; padding: 12px; border-radius: 10px; border: 1px solid #d0d0d8; background: #fff; color: #111; }
      button { background: #fff; cursor: pointer; }
      .log { display: grid; gap: 12px; max-height: 420px; overflow: auto; }
      .entry { background: #fff; padding: 14px; border-radius: 12px; border: 1px solid #d0d0d8; }
      .meta { font-size: 12px; color: #555; margin-bottom: 8px; }
            @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="nav">
        <a href="/">Home</a><a href="/mealplan/">Meal Plan</a><a href="/dashboard/">Dashboard</a><a href="/tools/">Tools</a><a href="/rc/">RC</a>
      </div>
      <h1>RC Workspace</h1>
      <p class="small">Discord-style RC command room for tasks, notes, and links.</p>
      <div class="grid">
        <div class="panel">
          <label>Task</label>
          <input id="task" placeholder="What needs doing?" />
          <label>Notes</label>
                    <textarea id="notes" rows="8"></textarea>
          <label>Links</label>
          <input id="links" placeholder="Paste URL or reference" />
          <div class="row">
            <button onclick="addEntry()">Save Entry</button>
            <button onclick="clearAll()">Clear All</button>
          </div>
          <div id="out" class="small">Fill in the fields and click Save Entry.</div>
        </div>
        <div class="panel">
          <strong>Quick Actions</strong>
          <p class="small">Use this like the RC channel.</p>
          <button onclick="setSample('Check latest updates')">Check updates</button>
          <button onclick="setSample('Review channel history')">Review history</button>
          <button onclick="setSample('Search the web')">Search web</button>
                   <button onclick="setSample('Summarize current state')">Summarize state</button>
        </div>
      </div>
      <div class="panel" style="margin-top:16px;">
        <strong>Saved Entries</strong>
        <div id="entries" class="log"></div>
      </div>
    </div>
    <script>
      const key = 'rc_entries';
      function loadEntries() { return JSON.parse(localStorage.getItem(key) || '[]'); }
      function saveEntries(entries) { localStorage.setItem(key, JSON.stringify(entries)); renderEntries(entries); }
      function renderEntries(entries) {
        const list = document.getElementById('entries');
        list.innerHTML = '';
                entries.slice().reverse().forEach((e) => {
          const div = document.createElement('div');
          div.className = 'entry';
          div.innerHTML = `<div class="meta">${new Date(e.ts).toLocaleString()}</div><strong>${escapeHtml(e.task)}</strong><div class="small" style="margin-top:8px; white-space:pre-wrap;">${escapeHtml(e.notes)}</div><div class="small" style="margin-top:8px;">${escapeHtml(e.links)}</div>`;
          list.appendChild(div);
        });
      }
      function addEntry() {
        const entries = loadEntries();
        const entry = { task: document.getElementById('task').value || 'No task', notes: document.getElementById('notes').value || 'No notes', links: document.getElementById('links').value || 'No links', ts: new Date().toISOString() };
        entries.push(entry); saveEntries(entries); document.getElementById('out').textContent = `Saved: ${entry.task}`;
      }
      function clearAll() { localStorage.removeItem(key); document.getElementById('task').value=''; document.getElementById('notes').value=''; document.getElementById('links').value=''; document.getElementById('out').textContent='Cleared.'; renderEntries([]); }
      function setSample(text) { document.getElementById('task').value = text; }
      function escapeHtml(s) { return String(s).replace(/[&<>\"]+/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m])); }
            renderEntries(loadEntries());
    </script>
  </body>
</html>
